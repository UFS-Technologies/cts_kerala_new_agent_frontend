
  <div class="text-center mb-4">
    <img src="../../../../tvm_admin_assets/img/cts_logo.png" alt="Logo" style="margin-bottom: 15px;">
    <h2 style="font-weight: bold; color: #333;">Welcome back!</h2>
    <p style="color: #777;">Enter to get unlimited access to data & information.</p>
  </div>
  <form [formGroup]="loginForm" (submit)="login()">
    <div class="mb-3">
      <label for="email" class="form-label">Login Name</label>
      <input formControlName="userName" class="form-control" matInput placeholder="Login Name" type="text"/>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input  formControlName="password" class="form-control" matInput  placeholder="Password"  type="password" />   
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <input type="checkbox" id="remember" style="margin-right: 5px;">
        <label for="remember" style="font-size: 0.9rem;">Remember me</label>
      </div>
     
    </div>
    <button [disabled]='loginForm.invalid' type="submit" class="btn btn-primary w-100 mb-3" style="background-color: #6a4c93; border: none; border-radius: 5px;">Log In</button>
   
  </form>
